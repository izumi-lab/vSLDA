name: ml-ci

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - name: Install Poetry
        run: python -m pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --with dev,ml
      - name: Install NLTK data
        run: poetry run setup-nltk
      - name: Pytest
        run: poetry run pytest -q -m "slow or integration"
